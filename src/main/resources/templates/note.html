<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Gestiune Note</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        .navbar { background-color: #2c3e50; padding: 15px; text-align: center; }
        .navbar a { color: white; text-decoration: none; padding: 10px 20px; font-weight: bold; display: inline-block; }
        .navbar a:hover { background-color: #34495e; border-radius: 5px; }
        
        /* Containerul central (Cardul alb) */
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1); 
            margin: 40px auto; 
            width: 80%; 
            max-width: 1000px; 
            text-align: left; 
        }

        /* Stilizare tabele și formulare */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #2c3e50; }
        
        input[type="number"], input[type="date"], select { 
            padding: 10px; 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
        }
        
        button { 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            padding: 12px 15px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold; 
            width: 100%; 
            font-size: 16px;
        }
        button:hover { background-color: #2ecc71; }
        
        h2 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-top: 0; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/">Acasă</a>
    
    <!-- ELEMENTE PENTRU UTILIZATORII LOGAȚI -->
    <th:block sec:authorize="isAuthenticated()">
        <!-- Admin/Profesor -->
        <th:block sec:authorize="hasAnyRole('ADMIN', 'PROFESOR')">
            <a href="/materii">Materii</a>
        </th:block>

        <!-- Doar Admin -->
        <th:block sec:authorize="hasRole('ADMIN')">
            <a href="/grupe">Grupe</a>
            <a href="/studenti">Studenți</a>
            <a href="/profesori">Profesori</a>
        </th:block>
        
        <!-- Toți cei logați văd Notele -->
        <a href="/note">Note / Carnet</a>
        
        <!-- Buton de Logout -->
        <a href="/logout" style="color: #ff7675;">Logout ([[${#authentication.name}]])</a>
    </th:block>

    <!-- ELEMENTE PENTRU VIZITATORI (NEAUTENTIFICAȚI) -->
    <th:block sec:authorize="isAnonymous()">
        <a href="/login" style="background-color: #27ae60; border-radius: 5px;">Autentificare (Login)</a>
    </th:block>
</div>

<!-- AICI ÎNCEPE CARDUL ALB CARE ÎMBRACĂ CONȚINUTUL -->
<div class="container">

    <!-- SECȚIUNEA DE ACORDARE NOTĂ (Vizibilă doar pt Admin și Profesor) -->
    <div sec:authorize="hasAnyRole('ADMIN', 'PROFESOR')">
        <h2>Acordă o Notă</h2>
        
        <form th:action="@{/note/salveaza}" method="post">
            <div class="form-grid">
                <!-- Selectare Student -->
                <div class="form-group">
                    <label>Student:</label>
                    <select name="idStudent" required>
                        <option value="">-- Alege Studentul --</option>
                        <option th:each="s : ${studenti}" th:value="${s.idStudent}" th:text="${s.nume + ' ' + s.prenume + ' (' + s.matricol + ')'}"></option>
                    </select>
                </div>

                <!-- Selectare Materie -->
                <div class="form-group">
                    <label>Materie:</label>
                    <select name="idMaterie" required>
                        <option value="">-- Alege Materia --</option>
                        <option th:each="m : ${materii}" th:value="${m.idMaterie}" th:text="${m.denumire + ' (' + m.credite + ' credite)'}"></option>
                    </select>
                </div>

                <!-- Selectare Profesor -->
                <div class="form-group">
                    <label>Profesor Evaluator:</label>
                    <select name="idProfesor" required>
                        <option value="">-- Alege Profesorul --</option>
                        <option th:each="p : ${profesori}" th:value="${p.idProfesor}" th:text="${p.titluAcademic + ' ' + p.nume + ' ' + p.prenume}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Valoare Notă (1-10):</label>
                    <input type="number" name="valoare" min="1" max="10" required />
                </div>

                <div class="form-group">
                    <label>Data Acordării:</label>
                    <input type="date" name="dataAcordarii" required />
                </div>
            </div>
            <button type="submit">Salvează Nota</button>
        </form>
    </div>

    <!-- SECȚIUNEA CARNET ELECTRONIC -->
    
    <!-- Afișăm media doar pentru student -->
    <div th:if="${mediaGenerala != null}" style="background-color: #f1c40f; padding: 15px; border-radius: 8px; margin: 30px 0 10px 0; display: inline-block;">
        <h3 style="margin: 0; color: #2c3e50;">
            Media Generală: <span th:text="${mediaGenerala}"></span>
        </h3>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px;">
        <h2 style="border: none; padding: 0; margin: 0;">Carnet Electronic (Istoric Note)</h2>
        
        <!-- Butonul de PDF apare doar pentru studenți -->
        <a th:if="${#authorization.expression('hasRole(''STUDENT'')')}" 
           href="/note/export-pdf" 
           style="background-color: #e74c3c; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold;">
           Descarcă PDF Situație Școlară
        </a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Student</th>
                <th>Materie</th>
                <th>Notă</th>
                <th>Profesor</th>
                <th>Data</th>
                <!-- Adăugăm coloana Acțiuni doar pentru Admin/Profesor -->
                <th sec:authorize="hasAnyRole('ADMIN', 'PROFESOR')">Acțiuni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="n : ${note}">
                <td th:text="${n.student.nume + ' ' + n.student.prenume}"></td>
                <td th:text="${n.materie.denumire}"></td>
                <td th:text="${n.valoare}" style="font-weight: bold; color: #2980b9; font-size: 1.1em;"></td>
                <td th:text="${n.profesor.nume + ' ' + n.profesor.prenume}"></td>
                <td th:text="${n.dataAcordarii}"></td>
                
                <!-- Acțiuni (vizibil doar pt Admin/Profesor) -->
                <td sec:authorize="hasAnyRole('ADMIN', 'PROFESOR')" style="display: flex; gap: 10px; border: none;">
                    
                    <!-- Buton Editare -->
                    <a th:href="@{/note/editeaza/{id}(id=${n.idNota})}" 
                       style="background-color: #f39c12; color: white; padding: 5px 10px; text-decoration: none; border-radius: 5px; font-size: 14px; text-align: center;">
                        Editează
                    </a>

                    <!-- Buton Ștergere -->
                    <form th:action="@{/note/sterge/{id}(id=${n.idNota})}" method="post" style="margin: 0;">
                        <button type="submit" style="background-color: #e74c3c; padding: 5px 10px; font-size: 14px; width: auto; margin: 0;" onclick="return confirm('Ești sigur că vrei să ștergi această notă?');">
                            Șterge
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</div> <!-- AICI SE ÎNCHIDE CARDUL ALB -->

</body>
</html>
