<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestiune Facultate</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; background-color: #f4f4f9; }
        .navbar { background-color: #2c3e50; padding: 15px; text-align: center; }
        .navbar a { color: white; text-decoration: none; padding: 10px 20px; font-weight: bold; }
        .navbar a:hover { background-color: #34495e; border-radius: 5px; }
        h1 { color: #2c3e50; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); margin-top: 50px; }
    </style>
</head>
<body>
    
    <div class="navbar">
        <a href="/">Acasă</a>
        <a href="/materii">Materii</a>
    </div>

    <div class="container">
        <h1 th:text="${mesajBunVenit}">Titlu default</h1>
        <p>Aceasta este pagina publică a facultății.</p>
    </div>
</body>
</html>
