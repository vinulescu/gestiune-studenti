<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Editează Nota</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        .navbar { background-color: #2c3e50; padding: 15px; text-align: center; }
        .navbar a { color: white; text-decoration: none; padding: 10px 20px; font-weight: bold; display: inline-block; }
        .navbar a:hover { background-color: #34495e; border-radius: 5px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); margin: 40px auto; width: 80%; max-width: 800px; text-align: left; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #2c3e50; }
        input[type="number"], input[type="date"], select { padding: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #f39c12; color: white; border: none; padding: 12px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { background-color: #e67e22; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/">Acasă</a>
    <a href="/materii">Materii</a>
    <a href="/grupe">Grupe</a>
    <a href="/studenti">Studenți</a>
    <a href="/profesori">Profesori</a>
    <a href="/note">Note / Carnet</a>
    <a href="/logout" style="color: #ff7675;">Logout</a>
</div>

<div class="container">
    <h2 style="color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px;">Modifică Nota</h2>
    
    <form th:action="@{/note/actualizeaza/{id}(id=${nota.idNota})}" method="post">
        <div class="form-grid">
            
            <div class="form-group">
                <label>Student:</label>
                <select name="idStudent" required>
                    <option th:each="s : ${studenti}" th:value="${s.idStudent}" th:text="${s.nume + ' ' + s.prenume}" th:selected="${s.idStudent == nota.student.idStudent}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Materie:</label>
                <select name="idMaterie" required>
                    <option th:each="m : ${materii}" th:value="${m.idMaterie}" th:text="${m.denumire}" th:selected="${m.idMaterie == nota.materie.idMaterie}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Profesor Evaluator:</label>
                <select name="idProfesor" required>
                    <option th:each="p : ${profesori}" th:value="${p.idProfesor}" th:text="${p.nume + ' ' + p.prenume}" th:selected="${p.idProfesor == nota.profesor.idProfesor}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Valoare Notă (1-10):</label>
                <input type="number" name="valoare" min="1" max="10" th:value="${nota.valoare}" required />
            </div>

            <div class="form-group">
                <label>Data Acordării:</label>
                <input type="date" name="dataAcordarii" th:value="${nota.dataAcordarii}" required />
            </div>
            
        </div>
        <button type="submit">Salvează Modificările</button>
    </form>
</div>

</body>
</html>
