<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Gestiune Materii</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        .navbar { background-color: #2c3e50; padding: 15px; text-align: center; }
        .navbar a { color: white; text-decoration: none; padding: 10px 20px; font-weight: bold; display: inline-block; }
        .navbar a:hover { background-color: #34495e; border-radius: 5px; }
        .container { width: 90%; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); max-width: 1000px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #2c3e50; }
        input[type="text"], input[type="number"] { padding: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #27ae60; color: white; border: none; padding: 12px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #2ecc71; }
        h2 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-top: 0; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/">Acasă</a>
    
    <th:block sec:authorize="isAuthenticated()">
        <th:block sec:authorize="hasAnyRole('ADMIN', 'PROFESOR')">
            <a href="/materii">Materii</a>
        </th:block>

        <th:block sec:authorize="hasRole('ADMIN')">
            <a href="/grupe">Grupe</a>
            <a href="/studenti">Studenți</a>
            <a href="/profesori">Profesori</a>
        </th:block>
        
        <a href="/note">Note / Carnet</a>
        
        <a href="/logout" style="color: #ff7675;">Logout ([[${#authentication.name}]])</a>
    </th:block>

    <th:block sec:authorize="isAnonymous()">
        <a href="/login" style="background-color: #27ae60; border-radius: 5px;">Autentificare (Login)</a>
    </th:block>
</div>

    <div class="container">
        
        <!-- Doar Adminii și Profesorii pot adăuga materii -->
        <div sec:authorize="hasAnyRole('ADMIN', 'PROFESOR')">
            <h2>Adaugă Materie Nouă</h2>
            <form th:action="@{/materii/salveaza}" th:object="${materieNoua}" method="post">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Denumire Materie:</label>
                        <input type="text" th:field="*{denumire}" required />
                    </div>
                    <div class="form-group">
                        <label>Credite:</label>
                        <input type="number" th:field="*{credite}" required />
                    </div>
                    <div class="form-group">
                        <label>Număr Ore:</label>
                        <input type="number" th:field="*{numarOre}" required />
                    </div>
                </div>
                <button type="submit" style="width: 100%; margin-top: 10px;">Salvează Materia</button>
            </form>
            <hr style="margin: 40px 0; border: 1px solid #ecf0f1;">
        </div>

        <h2 style="border: none; padding-bottom: 0;">Lista Materii Disponibile</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Denumire</th>
                    <th>Credite</th>
                    <th>Număr Ore</th>
                    <th sec:authorize="hasAnyRole('ADMIN', 'PROFESOR')">Acțiuni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${materii}">
                    <td th:text="${m.idMaterie}"></td>
                    <td th:text="${m.denumire}" style="font-weight: bold; color: #2c3e50;"></td>
                    <td th:text="${m.credite}"></td>
                    <td th:text="${m.numarOre}"></td>
                    
                    <td sec:authorize="hasAnyRole('ADMIN', 'PROFESOR')" style="display: flex; gap: 10px; border: none; align-items: center;">
                        <a th:href="@{/materii/editeaza/{id}(id=${m.idMaterie})}" 
                           style="background-color: #f39c12; color: white; padding: 6px 12px; text-decoration: none; border-radius: 5px; font-size: 14px;">
                           Editează
                        </a>
                        <form th:action="@{/materii/sterge/{id}(id=${m.idMaterie})}" method="post" style="margin: 0;">
                            <button type="submit" style="background-color: #e74c3c; padding: 6px 12px; font-size: 14px; margin: 0; width: auto;" onclick="return confirm('Sigur ștergi această materie?');">
                                Șterge
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(materii)}">
                    <td colspan="5" style="text-align: center; padding: 20px;">Nu există materii înregistrate.</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
