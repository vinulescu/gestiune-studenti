<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestiune Materii</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        .navbar { background-color: #2c3e50; padding: 15px; text-align: center; }
        .navbar a { color: white; text-decoration: none; padding: 10px 20px; font-weight: bold; }
        .navbar a:hover { background-color: #34495e; border-radius: 5px; }
        .container { width: 80%; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .form-group { margin-bottom: 15px; }
        input[type="text"], input[type="number"] { padding: 8px; width: 100%; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background-color: #2ecc71; }
    </style>
</head>
<body>

    <!-- REQ-3: Bara de navigare -->
    <div class="navbar">
        <a href="/">Acasă</a>
        <a href="/materii">Materii</a>
    </div>

    <div class="container">
        <!-- REQ-29: Formularul de adăugare -->
        <h2>Adaugă Materie Nouă</h2>
        <form th:action="@{/materii/salveaza}" th:object="${materieNoua}" method="post">
            <div class="form-group">
                <label>Denumire Materie:</label>
                <input type="text" th:field="*{denumire}" required />
            </div>
            <div class="form-group">
                <label>Credite:</label>
                <input type="number" th:field="*{credite}" required />
            </div>
            <div class="form-group">
                <label>Număr Ore:</label>
                <input type="number" th:field="*{numarOre}" required />
            </div>
            <button type="submit">Salvează Materia</button>
        </form>

        <hr>

        <!-- REQ-30: Afișarea listei sub formă de tabel -->
        <h2>Lista Materii Disponibile</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Denumire</th>
                    <th>Credite</th>
                    <th>Număr Ore</th>
                </tr>
            </thead>
            <tbody>
                <!-- Thymeleaf va genera un rând pentru fiecare materie din baza de date -->
                <tr th:each="m : ${materii}">
                    <td th:text="${m.idMaterie}"></td>
                    <td th:text="${m.denumire}"></td>
                    <td th:text="${m.credite}"></td>
                    <td th:text="${m.numarOre}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(materii)}">
                    <td colspan="4" style="text-align: center;">Nu există materii înregistrate.</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
