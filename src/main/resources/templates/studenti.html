<!DOCTYPE html>
<html xmlns:th="[http://www.thymeleaf.org](http://www.thymeleaf.org)" xmlns:sec="[http://www.thymeleaf.org/extras/spring-security](http://www.thymeleaf.org/extras/spring-security)">
<head>
    <meta charset="UTF-8">
    <title>Gestiune Studenți</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        .navbar { background-color: #2c3e50; padding: 15px; text-align: center; }
        .navbar a { color: white; text-decoration: none; padding: 10px 20px; font-weight: bold; }
        .navbar a:hover { background-color: #34495e; border-radius: 5px; }
        .container { width: 90%; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"], select { padding: 8px; width: 100%; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; }
        button:hover { background-color: #2ecc71; }
        .sectiune-formular { border: 1px solid #eee; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/">Acasă</a>
    
    <!-- ELEMENTE PENTRU UTILIZATORII LOGAȚI -->
    <th:block sec:authorize="isAuthenticated()">
        <!-- Admin/Profesor -->
        <th:block sec:authorize="hasAnyRole('ADMIN', 'PROFESOR')">
            <a href="/materii">Materii</a>
        </th:block>

        <!-- Doar Admin -->
        <th:block sec:authorize="hasRole('ADMIN')">
            <a href="/grupe">Grupe</a>
            <a href="/studenti">Studenți</a>
            <a href="/profesori">Profesori</a>
        </th:block>
        
        <!-- Toți cei logați văd Notele -->
        <a href="/note">Note / Carnet</a>
        
        <!-- Buton de Logout -->
        <a href="/logout" style="color: #ff7675;">Logout ([[${#authentication.name}]])</a>
    </th:block>

    <!-- ELEMENTE PENTRU VIZITATORI (NEAUTENTIFICAȚI) -->
    <th:block sec:authorize="isAnonymous()">
        <!-- Acum butonul de Note DISPARE și apare cel de LOGIN -->
        <a href="/login" style="background-color: #27ae60; border-radius: 5px;">Autentificare (Login)</a>
    </th:block>
</div>

    <div class="container">
        <h2>Adaugă Student Nou</h2>
        
        <form th:action="@{/studenti/salveaza}" method="post">
            <div class="form-grid">
                <!-- Datele pentru Utilizator -->
                <div class="sectiune-formular">
                    <h3>Date Cont (Utilizator)</h3>
                    <div class="form-group"><label>Username:</label> <input type="text" name="username" required /></div>
                    <div class="form-group"><label>Parolă:</label> <input type="password" name="parola" required /></div>
                    <div class="form-group"><label>Email:</label> <input type="email" name="email" required /></div>
                </div>

                <!-- Datele pentru Student -->
                <div class="sectiune-formular">
                    <h3>Date Personale (Student)</h3>
                    <div class="form-group"><label>Nume:</label> <input type="text" name="nume" required /></div>
                    <div class="form-group"><label>Prenume:</label> <input type="text" name="prenume" required /></div>
                    <div class="form-group"><label>CNP:</label> <input type="text" name="cnp" required maxlength="13" /></div>
                    <div class="form-group"><label>Nr. Matricol:</label> <input type="text" name="matricol" required /></div>
                    
                    <!-- REQ-27: Dropdown pentru Grupa -->
                    <div class="form-group">
                        <label>Asignare Grupă:</label>
                        <select name="idGrupa" required>
                            <option value="">-- Selectează o grupă --</option>
                            <option th:each="g : ${grupe}" th:value="${g.idGrupa}" th:text="${g.numeGrupa} + ' (An ' + ${g.anStudiu} + ')'"></option>
                        </select>
                    </div>
                </div>
            </div>
            <button type="submit">Înregistrează Studentul</button>
        </form>

        <hr>

        <h2>Lista Studenți Înregistrați</h2>
        <table>
            <thead>
                <tr>
                    <th>Matricol</th>
                    <th>Nume și Prenume</th>
                    <th>Grupă</th>
                    <th>Email Cont</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${studenti}">
                    <td th:text="${s.matricol}"></td>
                    <td th:text="${s.nume + ' ' + s.prenume}"></td>
                    <td th:text="${s.grupa != null ? s.grupa.numeGrupa : 'Fără grupă'}"></td>
                    <td th:text="${s.utilizator.email}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
