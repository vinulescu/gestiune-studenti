<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Gestiune Studenți</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        .navbar { background-color: #2c3e50; padding: 15px; text-align: center; }
        .navbar a { color: white; text-decoration: none; padding: 10px 20px; font-weight: bold; display: inline-block; }
        .navbar a:hover { background-color: #34495e; border-radius: 5px; }
        .container { width: 90%; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); max-width: 1200px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #2c3e50; }
        input[type="text"], input[type="email"], input[type="password"], select { padding: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #27ae60; color: white; border: none; padding: 12px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { background-color: #2ecc71; }
        .sectiune-formular { border: 1px solid #ecf0f1; padding: 20px; border-radius: 8px; background-color: #fcfcfc; }
        h2 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-top: 0; }
        h3 { color: #34495e; margin-top: 0; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/">Acasă</a>
    
    <!-- ELEMENTE PENTRU UTILIZATORII LOGAȚI -->
    <th:block sec:authorize="isAuthenticated()">
        <!-- Admin/Profesor -->
        <th:block sec:authorize="hasAnyRole('ADMIN', 'PROFESOR')">
            <a href="/materii">Materii</a>
        </th:block>

        <!-- Doar Admin -->
        <th:block sec:authorize="hasRole('ADMIN')">
            <a href="/grupe">Grupe</a>
            <a href="/studenti">Studenți</a>
            <a href="/profesori">Profesori</a>
        </th:block>
        
        <!-- Toți cei logați văd Notele -->
        <a href="/note">Note / Carnet</a>
        
        <!-- Buton de Logout -->
        <a href="/logout" style="color: #ff7675;">Logout ([[${#authentication.name}]])</a>
    </th:block>

    <!-- ELEMENTE PENTRU VIZITATORI (NEAUTENTIFICAȚI) -->
    <th:block sec:authorize="isAnonymous()">
        <!-- Acum butonul de Note DISPARE și apare cel de LOGIN -->
        <a href="/login" style="background-color: #27ae60; border-radius: 5px;">Autentificare (Login)</a>
    </th:block>
</div>

    <div class="container">
        <!-- DOAR ADMINUL POATE ADĂUGA STUDENȚI -->
        <div sec:authorize="hasRole('ADMIN')">
            <h2>Adaugă Student Nou</h2>
            
            <form th:action="@{/studenti/salveaza}" method="post">
                <div class="form-grid">
                    <!-- Datele pentru Utilizator -->
                    <div class="sectiune-formular">
                        <h3>Date Cont (Utilizator)</h3>
                        <div class="form-group"><label>Username:</label> <input type="text" name="username" required /></div>
                        <div class="form-group"><label>Parolă:</label> <input type="password" name="parola" required /></div>
                        <div class="form-group"><label>Email:</label> <input type="email" name="email" required /></div>
                    </div>

                    <!-- Datele pentru Student -->
                    <div class="sectiune-formular">
                        <h3>Date Personale (Student)</h3>
                        <div class="form-group"><label>Nume:</label> <input type="text" name="nume" required /></div>
                        <div class="form-group"><label>Prenume:</label> <input type="text" name="prenume" required /></div>
                        <div class="form-group"><label>CNP:</label> <input type="text" name="cnp" required maxlength="13" /></div>
                        <div class="form-group"><label>Nr. Matricol:</label> <input type="text" name="matricol" required /></div>
                        
                        <!-- REQ-27: Dropdown pentru Grupa -->
                        <div class="form-group">
                            <label>Asignare Grupă:</label>
                            <select name="idGrupa" required>
                                <option value="">-- Selectează o grupă --</option>
                                <option th:each="g : ${grupe}" th:value="${g.idGrupa}" th:text="${g.numeGrupa} + ' (An ' + ${g.anStudiu} + ')'"></option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit">Înregistrează Studentul</button>
            </form>

            <hr style="margin: 40px 0; border: 1px solid #ecf0f1;">
        </div>

        <h2 style="border: none; padding-bottom: 0;">Lista Studenți Înregistrați</h2>
        <table>
            <thead>
                <tr>
                    <th>Matricol</th>
                    <th>Nume și Prenume</th>
                    <th>Grupă</th>
                    <th>Email Cont</th>
                    <!-- COLOANA DE ACȚIUNI -->
                    <th sec:authorize="hasRole('ADMIN')">Acțiuni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${studenti}">
                    <td th:text="${s.matricol}" style="font-weight: bold;"></td>
                    <td th:text="${s.nume + ' ' + s.prenume}"></td>
                    <td th:text="${s.grupa != null ? s.grupa.numeGrupa : 'Fără grupă'}" style="color: #2980b9;"></td>
                    <td th:text="${s.utilizator.email}"></td>
                    
                    <!-- BUTOANELE DE EDITARE ȘI ȘTERGERE PENTRU FIECARE STUDENT -->
                    <td sec:authorize="hasRole('ADMIN')" style="display: flex; gap: 10px; border: none; align-items: center;">
                        <a th:href="@{/studenti/editeaza/{id}(id=${s.idStudent})}" 
                           style="background-color: #f39c12; color: white; padding: 8px 12px; text-decoration: none; border-radius: 5px; font-size: 14px; text-align: center;">
                           Editează
                        </a>
                        <form th:action="@{/studenti/sterge/{id}(id=${s.idStudent})}" method="post" style="margin: 0;">
                            <button type="submit" style="background-color: #e74c3c; padding: 8px 12px; font-size: 14px; margin: 0; width: auto;" onclick="return confirm('Sigur ștergi acest student? Notă: Dacă are note în carnet, ștergerea ar putea eșua pentru a proteja istoricul școlar.');">
                                Șterge
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
