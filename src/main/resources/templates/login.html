<!DOCTYPE html>
<html xmlns:th="[http://www.thymeleaf.org](http://www.thymeleaf.org)" xmlns:sec="[http://www.thymeleaf.org/extras/spring-security](http://www.thymeleaf.org/extras/spring-security)">
<head>
    <meta charset="UTF-8">
    <title>Autentificare</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; margin-top: 100px; }
        .login-box { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background-color: #2980b9; color: white; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Autentificare</h2>
        
        <!-- Spring Security trimite parametrul ?error daca parola e gresita -->
        <div th:if="${param.error}" class="error">Username sau parolă incorecte!</div>
        <div th:if="${param.logout}" style="color: green; margin-bottom: 10px;">Te-ai deconectat cu succes!</div>

        <!-- REQ-9: Formularul de autentificare -->
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Username" required />
            <input type="password" name="password" placeholder="Parolă" required />
            <button type="submit">Intră în cont</button>
        </form>
    </div>
</body>
</html>
