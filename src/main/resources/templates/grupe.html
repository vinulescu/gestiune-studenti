<!DOCTYPE html>
<html xmlns:th="[http://www.thymeleaf.org](http://www.thymeleaf.org)" xmlns:sec="[http://www.thymeleaf.org/extras/spring-security](http://www.thymeleaf.org/extras/spring-security)">
<head>
    <meta charset="UTF-8">
    <title>Gestiune Grupe</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        .navbar { background-color: #2c3e50; padding: 15px; text-align: center; }
        .navbar a { color: white; text-decoration: none; padding: 10px 20px; font-weight: bold; }
        .navbar a:hover { background-color: #34495e; border-radius: 5px; }
        .container { width: 80%; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .form-group { margin-bottom: 15px; }
        input[type="text"], input[type="number"] { padding: 8px; width: 100%; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background-color: #2ecc71; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/">Acasă</a>
    
    <!-- ELEMENTE PENTRU UTILIZATORII LOGAȚI -->
    <th:block sec:authorize="isAuthenticated()">
        <!-- Admin/Profesor -->
        <th:block sec:authorize="hasAnyRole('ADMIN', 'PROFESOR')">
            <a href="/materii">Materii</a>
        </th:block>

        <!-- Doar Admin -->
        <th:block sec:authorize="hasRole('ADMIN')">
            <a href="/grupe">Grupe</a>
            <a href="/studenti">Studenți</a>
            <a href="/profesori">Profesori</a>
        </th:block>
        
        <!-- Toți cei logați văd Notele -->
        <a href="/note">Note / Carnet</a>
        
        <!-- Buton de Logout -->
        <a href="/logout" style="color: #ff7675;">Logout ([[${#authentication.name}]])</a>
    </th:block>

    <!-- ELEMENTE PENTRU VIZITATORI (NEAUTENTIFICAȚI) -->
    <th:block sec:authorize="isAnonymous()">
        <!-- Acum butonul de Note DISPARE și apare cel de LOGIN -->
        <a href="/login" style="background-color: #27ae60; border-radius: 5px;">Autentificare (Login)</a>
    </th:block>
</div>

    <div class="container">
        <h2>Adaugă Grupa Nouă</h2>
        <form th:action="@{/grupe/salveaza}" th:object="${grupaNoua}" method="post">
            <div class="form-group">
                <label>Nume Grupa (ex: CR-3.1A):</label>
                <input type="text" th:field="*{numeGrupa}" required />
            </div>
            <div class="form-group">
                <label>An Studiu (ex: 3):</label>
                <input type="number" th:field="*{anStudiu}" required />
            </div>
            <div class="form-group">
                <label>Forma Învățământ (ex: Zi, ID, Sereno):</label>
                <input type="text" th:field="*{formaInvatamant}" required />
            </div>
            <button type="submit">Salvează Grupa</button>
        </form>

        <hr>

        <h2>Lista Grupe Disponibile</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nume Grupa</th>
                    <th>An Studiu</th>
                    <th>Forma Învățământ</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="g : ${grupe}">
                    <td th:text="${g.idGrupa}"></td>
                    <td th:text="${g.numeGrupa}"></td>
                    <td th:text="${g.anStudiu}"></td>
                    <td th:text="${g.formaInvatamant}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
